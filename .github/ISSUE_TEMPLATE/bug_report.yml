name: Bug Report
description: Report incorrect behavior in Ripple.jl.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproducer
      description: Minimal commands or Julia code that reproduce the issue.
      render: julia
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Julia version, platform, and optional packages involved.
    validations:
      required: false
