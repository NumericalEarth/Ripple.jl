name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.12'
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@v2

      - name: Instantiate package
        run: |
          julia --color=yes --startup-file=no --project=. -e 'using Pkg; Pkg.instantiate()'
          julia --color=yes --startup-file=no --project=. scripts/validation/patch_oceananigans_manifest_triggers.jl .

      - name: Run tests
        env:
          RIPPLE_TEST_SUMMARY: default_suite.tsv
        run: julia --color=yes --startup-file=no --project=. test/runtests.jl

      - uses: actions/upload-artifact@v4
        with:
          name: default-suite-${{ matrix.os }}-${{ matrix.version }}
          path: default_suite.tsv

  package-test:
    name: Package project suite Julia 1.12
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'

      - uses: julia-actions/cache@v2

      - name: Instantiate package
        run: |
          julia --color=yes --startup-file=no --project=. -e 'using Pkg; Pkg.instantiate()'
          julia --color=yes --startup-file=no --project=. scripts/validation/patch_oceananigans_manifest_triggers.jl .

      - name: Run package project suite
        run: julia --color=yes --startup-file=no --project=. test/runtests.jl

  optional-gates:
    name: Optional integration smokes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'

      - uses: julia-actions/cache@v2

      - name: Instantiate package
        run: |
          julia --color=yes --startup-file=no --project=. -e 'using Pkg; Pkg.instantiate()'
          julia --color=yes --startup-file=no --project=. scripts/validation/patch_oceananigans_manifest_triggers.jl .

      - name: Check optional runtime gates
        run: julia --color=yes --startup-file=no --project=. scripts/validation/check_optional_runtime_gates.jl optional_runtime_gates.tsv

      - name: Run available optional gates
        run: julia --color=yes --startup-file=no --project=. scripts/validation/run_available_optional_gates.jl optional_gate_outputs

      - uses: actions/upload-artifact@v4
        with:
          name: optional-gate-outputs
          path: |
            optional_runtime_gates.tsv
            optional_gate_outputs/
