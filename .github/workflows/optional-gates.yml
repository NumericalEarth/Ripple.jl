name: Optional Runtime Gates

on:
  workflow_dispatch:
    inputs:
      runner:
        description: Runner label with required optional runtimes installed
        required: true
        default: ubuntu-latest
        type: string
      require_all:
        description: Fail if any optional gate is unavailable
        required: true
        default: true
        type: boolean
      require_complete_audit:
        description: Fail if any goal-completion checklist row is not available
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: optional-gates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  optional-gates:
    name: Optional runtime gates
    runs-on: ${{ inputs.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'

      - uses: julia-actions/cache@v2

      - name: Instantiate package
        run: |
          julia --color=yes --startup-file=no --project=. -e 'using Pkg; Pkg.instantiate()'
          julia --color=yes --startup-file=no --project=. scripts/validation/patch_oceananigans_manifest_triggers.jl .

      - name: Run default suite for audit summary
        env:
          RIPPLE_TEST_SUMMARY: default_suite.tsv
        run: julia --color=yes --startup-file=no --project=. test/runtests.jl

      - name: Activate optional weak dependencies
        run: |
          optional_env="${RUNNER_TEMP}/ripple-optional-runtime"
          julia --color=yes --startup-file=no --project="${optional_env}" -e '
            using Pkg
            packages = [
              "Oceananigans",
              "GPUArraysCore",
              "KernelAbstractions",
              "CUDA",
            ]
            Sys.isapple() && push!(packages, "Metal")
            Pkg.add(packages)
          '
          julia --color=yes --startup-file=no --project=. \
            scripts/validation/patch_oceananigans_manifest_triggers.jl \
            "${optional_env}"
          echo "JULIA_LOAD_PATH=@:${optional_env}:@stdlib" >> "$GITHUB_ENV"

      - name: Check optional runtime gate readiness
        run: julia --color=yes --startup-file=no --project=. scripts/validation/check_optional_runtime_gates.jl optional_runtime_gates.tsv

      - name: Run optional runtime gates
        run: |
          flags=()
          if [[ "${{ inputs.require_all }}" == "true" ]]; then
            flags+=(--require-all)
          fi

          julia --color=yes --startup-file=no --project=. \
            scripts/validation/run_available_optional_gates.jl \
            "${flags[@]}" \
            optional_gate_outputs

      - name: Create publication bundle
        run: julia --color=yes --startup-file=no --project=. scripts/validation/create_publication_bundle.jl ripple-publication.bundle ripple-publication.gitdir

      - name: Test publication bundle
        run: julia --color=yes --startup-file=no --project=. scripts/validation/test_publication_bundle.jl ripple-publication.bundle publication_bundle_default_suite.tsv ripple-publication-worktree

      - name: Check publication readiness
        env:
          RIPPLE_PUBLICATION_BUNDLE: ripple-publication.bundle
          RIPPLE_PUBLICATION_BUNDLE_TEST_SUMMARY: publication_bundle_default_suite.tsv
        run: julia --color=yes --startup-file=no --project=. scripts/validation/check_publication_readiness.jl publication_readiness.tsv

      - name: Write goal completion checklist
        env:
          RIPPLE_PUBLICATION_BUNDLE: ripple-publication.bundle
          RIPPLE_PUBLICATION_BUNDLE_TEST_SUMMARY: publication_bundle_default_suite.tsv
        run: |
          flags=()
          if [[ "${{ inputs.require_complete_audit }}" == "true" ]]; then
            flags+=(--require-complete)
          fi

          julia --color=yes --startup-file=no --project=. \
            scripts/validation/write_goal_completion_checklist.jl \
            goal_completion_checklist.tsv \
            --default-suite-summary default_suite.tsv \
            "${flags[@]}"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: optional-runtime-gates
          path: |
            default_suite.tsv
            optional_runtime_gates.tsv
            optional_gate_outputs/
            ripple-publication.bundle
            publication_bundle_default_suite.tsv
            publication_readiness.tsv
            goal_completion_checklist.tsv
