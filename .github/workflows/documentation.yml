name: Documentation

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read
  statuses: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'

      - uses: julia-actions/cache@v2

      - name: Instantiate docs
        run: |
          julia --color=yes --startup-file=no --project=docs -e '
            using Pkg
            Pkg.develop(PackageSpec(path=pwd()))
            Pkg.instantiate()
          '
          julia --color=yes --startup-file=no --project=. \
            scripts/validation/patch_oceananigans_manifest_triggers.jl docs

      - name: Build and deploy docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
        run: julia --color=yes --startup-file=no --project=docs docs/make.jl

      # Documenter's built-in `documenter/deploy` commit status is posted to
      # the deploy_repo (RippleDocumentation), where the source SHA doesn't
      # exist — the API call 404s and no clickable preview link appears on
      # the PR. Post the status manually against the source repo instead.
      - name: Post documentation preview status
        if: github.event_name == 'pull_request' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh api -X POST "repos/${GITHUB_REPOSITORY}/statuses/${PR_SHA}" \
            -f state=success \
            -f context="documenter/deploy" \
            -f description="Documentation preview" \
            -f target_url="https://numericalearth.github.io/RippleDocumentation/previews/PR${PR_NUMBER}/"
